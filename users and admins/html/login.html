<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../css/login.css">
        <script src="../javascript/login.js" type="module" defer></script>
        <title>Login page</title>
    </head>
    <body>
        <h1>Login</h1>
        <form>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            Forgot your password? <a href="forgotpass.html">Click here</a> to reset it.<br><br>

            <button type="submit">Login</button>

            <p class="login-link">New to here? Please use the <a href="signup.html">Sign Up</a> link to create your account.</p>
        </form>
    </body>
</html>
